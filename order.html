
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Order Confirmation | KraftAura</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<style>

body{
    background:rgb(223, 140, 52);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    width:550px;
    padding:35px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(212,160,23,.8);
    text-align:center;
    background:white;
}

img{
    width:130px;
    border-radius:50%;
}

h2{
    color:#c89b4a;
    margin-top:20px;
}

.btn-home{
    background:rgb(223, 140, 52);
    color:black;
    font-weight:bold;
    border:none;
}

.btn-home:hover{
    background:#b68b3d;
}

</style>

</head>
<body>

<div class="card">

<img src="images/logo.jpeg">

<h2>🎉 Order Placed Successfully!</h2>

<p>
Thank you for choosing <b>KraftAura</b>.<br>
Your order has been received successfully.
</p>

<p>
Our team will contact you soon.
</p>

<a href="index.html" class="btn btn-home">
Continue Shopping
</a>

</div>
<script>
window.onload = function () {

    var duration = 3000;
    var end = Date.now() + duration;

    (function frame() {

        confetti({
            particleCount: 7,
            angle: 60,
            spread: 80,
            origin: { x: 0 }
        });

        confetti({
            particleCount: 7,
            angle: 120,
            spread: 80,
            origin: { x: 1 }
        });

        if (Date.now() < end) {
            requestAnimationFrame(frame);
        }

    })();

};
</script>

</body>
</html>
